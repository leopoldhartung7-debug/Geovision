name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (import + logic tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: geovision-pro/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install light deps (no torch/transformers)
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.115.6 "pydantic==2.10.4" "pydantic-settings==2.7.1" \
            "SQLAlchemy==2.0.36" aiosqlite httpx==0.28.1 \
            "Pillow==11.1.0" "numpy==2.2.1" "reportlab==4.2.5" \
            python-multipart==0.0.18 pytest
      - name: Compile all modules
        run: python -m compileall -q app tests
      - name: Run tests (sqlite, model not loaded)
        env:
          GEOVISION_DATABASE_URL: "sqlite+aiosqlite:///./ci.db"
          GEOVISION_MODEL_LAZY_LOAD: "true"
        run: pytest

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: geovision-pro/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Type-check & build
        run: npm run build
