name: Deploy to Hugging Face Space

# Phone-friendly deploy: run this from the GitHub "Actions" tab (Run workflow).
# It pushes the single-container app to your Hugging Face Space, which then builds
# it and serves a public, phone-openable URL (https://<user>-<space>.hf.space).
#
# One-time setup (all doable in a phone browser):
#   1. Create a free account at https://huggingface.co
#   2. Create a *write* token: https://huggingface.co/settings/tokens
#   3. In this GitHub repo: Settings → Secrets and variables → Actions →
#      New repository secret → name HF_TOKEN, value = your token
#   4. Actions tab → "Deploy to Hugging Face Space" → Run workflow →
#      enter your HF username → Run.

on:
  workflow_dispatch:
    inputs:
      hf_username:
        description: "Your Hugging Face username"
        required: true
      space_name:
        description: "Space name to create/update"
        required: false
        default: "geovision-pro"
  # Also auto-deploys on every push to this branch (no need for the default
  # branch / no "Run workflow" button required). Needs the HF_TOKEN secret and
  # the HF_USERNAME variable to be set in the repo.
  push:
    branches: ["claude/geovision-location-app-rsAvz"]
    paths:
      - "geovision-pro/**"
      - ".github/workflows/deploy-hf-space.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push app to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
        working-directory: geovision-pro
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Missing HF_TOKEN secret. Add it in Settings → Secrets and variables → Actions (Secrets tab)."
            exit 1
          fi
          USER_NAME="${{ inputs.hf_username }}"
          USER_NAME="${USER_NAME:-$HF_USERNAME}"
          if [ -z "$USER_NAME" ]; then
            echo "::error::Missing HF username. Add an HF_USERNAME variable (Variables tab) or run the workflow manually with the username input."
            exit 1
          fi
          chmod +x deploy_hf_space.sh
          ./deploy_hf_space.sh "$USER_NAME" "${{ inputs.space_name || 'geovision-pro' }}"
